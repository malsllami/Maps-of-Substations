<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حسابي | محطات التوزيع</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--blue-deep:#1B4D8C;--blue-mid:#2E7DD1;--teal:#1FAE8C;--teal-light:#4DD6B5;}
[data-theme="dark"]{--bg:#0A1420;--bg-elev:#101D2E;--bg-card:#0D1826;--text-primary:#EAF1F7;--text-secondary:#8FA3B8;--border:rgba(255,255,255,0.08);--border-strong:rgba(255,255,255,0.16);--danger:#E0654F;--danger-bg:rgba(224,101,79,0.1);}
[data-theme="light"]{--bg:#EAF1F6;--bg-elev:#F4F8FB;--bg-card:#FFFFFF;--text-primary:#102035;--text-secondary:#52647A;--border:rgba(16,32,53,0.10);--border-strong:rgba(16,32,53,0.20);--danger:#C8412C;--danger-bg:rgba(200,65,44,0.08);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;padding-bottom:24px;transition:background .3s,color .3s;}
/* ===== هيدر موحّد مطابق لبقية الصفحات (الرئيسية ولوحة المدير) ===== */
header{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--border);display:flex;flex-direction:column;}
.header-row-main{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;}
.brand{display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none;}
.brand-mark{height:32px;width:auto;flex-shrink:0;display:block;object-fit:contain;transition:transform .2s;}
.brand:hover .brand-mark{transform:scale(1.06);}
.brand-text{font-size:15px;font-weight:700;letter-spacing:.3px;white-space:nowrap;transition:color .2s;}
.brand:hover .brand-text{color:var(--teal);}
.brand-sub{font-size:11px;color:var(--text-secondary);}
.header-actions{display:flex;align-items:center;gap:8px;}
.mobile-user-menu{position:relative;}
.mobile-menu-trigger{
  display:flex;align-items:center;gap:5px;
  background:var(--bg-card);border:1px solid var(--border-strong);border-radius:20px;
  padding:8px 14px;font-size:12.5px;font-weight:500;color:var(--text-primary);
  cursor:pointer;font-family:inherit;
}
.mobile-menu-trigger:hover{border-color:var(--teal);}
.mobile-menu-trigger svg{transition:transform .2s;flex-shrink:0;}
.mobile-user-menu.open .mobile-menu-trigger svg{transform:rotate(180deg);}
.mobile-menu-panel{
  position:absolute;top:calc(100% + 8px);left:0;
  background:var(--bg-card);border:1px solid var(--border-strong);border-radius:14px;
  min-width:190px;box-shadow:0 10px 28px rgba(0,0,0,.35);
  padding:8px;display:none;z-index:60;
}
.mobile-user-menu.open .mobile-menu-panel{display:block;}
.mobile-menu-row{display:flex;align-items:center;justify-content:space-between;padding:9px 10px;font-size:12.5px;color:var(--text-primary);}
.mobile-menu-link{display:block;padding:10px 10px;font-size:12.5px;color:var(--text-primary);text-decoration:none;border-radius:8px;}
.mobile-menu-link:hover{background:var(--bg-elev);}
.mobile-menu-logout{
  width:100%;text-align:right;padding:10px 10px;font-size:12.5px;color:#E0654F;
  background:transparent;border:none;border-top:1px solid var(--border);margin-top:4px;
  cursor:pointer;font-family:inherit;
}
.theme-switch{
  width:42px;height:23px;border-radius:12px;position:relative;flex-shrink:0;
  background:var(--border-strong);border:none;cursor:pointer;transition:background .2s;padding:0;
}
.theme-switch.on{background:var(--teal);}
.theme-switch-knob{position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
.theme-switch.on .theme-switch-knob{transform:translateX(19px);}
/* شريط حالة الاتصال + آخر تحديث — جزء بنيوي فعلي من الهيدر، لا عنصر شقيق منفصل / Connection status bar — structural part of header, not a separate sibling */
.header-row-status{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg-elev);border-top:1px solid var(--border);
  padding:6px 28px;font-size:11px;color:var(--text-secondary);
}
.status-bar-item{display:flex;align-items:center;gap:6px;}
.conn-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#8FA3B8;transition:background .3s;}
.conn-dot.online{background:#2ECC71;box-shadow:0 0 6px rgba(46,204,113,.6);}
.conn-dot.offline{background:#E0654F;box-shadow:0 0 6px rgba(224,101,79,.6);}
@media(max-width:600px){
  .header-row-main{padding:12px 14px;}
  .brand-sub{display:none;}
  .header-row-status{padding:6px 12px;font-size:10px;}
}
.wrap{max-width:480px;margin:0 auto;padding:24px 24px 0;}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:16px;}
.avatar{width:56px;height:56px;border-radius:50%;background:conic-gradient(from 200deg,var(--blue-deep),var(--blue-mid),var(--teal),var(--teal-light),var(--blue-deep));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:20px;margin-bottom:14px;}
h2{font-size:17px;font-weight:700;margin-bottom:4px;}
.role-badge{display:inline-block;font-size:11px;color:var(--teal);background:rgba(31,174,140,0.1);padding:3px 10px;border-radius:10px;margin-top:6px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;color:var(--text-secondary);margin-bottom:6px;}
.input-base{width:100%;height:44px;background:var(--bg);border:1px solid var(--border-strong);border-radius:10px;color:var(--text-primary);font-family:inherit;font-size:14px;padding:0 14px;outline:none;}
.input-base:disabled{opacity:.55;}
.input-base:focus{border-color:var(--teal);}
.meta-row{display:flex;justify-content:space-between;font-size:12.5px;padding:8px 0;border-top:1px solid var(--border);color:var(--text-secondary);}
.meta-row span:last-child{color:var(--text-primary);font-family:'JetBrains Mono',monospace;}
.error-banner{background:var(--danger-bg);color:var(--danger);font-size:12.5px;padding:10px 12px;border-radius:8px;margin-bottom:14px;display:none;}
.error-banner.show{display:block;}
.success-banner{background:rgba(31,174,140,0.12);color:var(--teal);font-size:12.5px;padding:10px 12px;border-radius:8px;margin-bottom:14px;display:none;}
.success-banner.show{display:block;}
.btn-progress{position:relative;width:100%;height:46px;border-radius:10px;border:none;background:var(--teal);color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;overflow:hidden;}
.btn-progress:disabled{cursor:not-allowed;}
.btn-progress .label{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;gap:8px;height:100%;}
.btn-progress .fill{position:absolute;inset:0;width:0%;background:rgba(255,255,255,0.28);transition:width .25s linear;z-index:1;}
.btn-progress.error{background:var(--danger);}
.btn-progress .pct{font-family:'JetBrains Mono',monospace;font-size:13px;display:none;}
</style>
</head>
<body data-theme="dark" id="bodyEl">
<script>
(function(){
  var saved = localStorage.getItem('sec-theme');
  if(saved==='light'||saved==='dark') document.getElementById('bodyEl').setAttribute('data-theme', saved);
  var session = localStorage.getItem('sec-session');
  if(!session){ location.href = 'auth.html'; }
})();
</script>

<header>
  <div class="header-row-main">
    <div class="brand" id="brandLink" style="cursor:pointer">
      <img class="brand-mark" src="assets/logo-icon.png" alt="شعار الشركة السعودية للطاقة">
      <div>
        <div class="brand-text">حسابي</div>
        <div class="brand-sub">الشركة السعودية للطاقة — محطات التوزيع</div>
      </div>
    </div>
    <div class="header-actions" id="headerActions">
      <div class="mobile-user-menu" id="mobileUserMenu">
        <button class="mobile-menu-trigger" id="mobileMenuTrigger">
          <span id="mobileMenuName">القائمة</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </button>
        <div class="mobile-menu-panel" id="mobileMenuPanel">
          <div class="mobile-menu-row">
            <span>الوضع الداكن</span>
            <button class="theme-switch" id="themeSwitchMobile" aria-label="تبديل الوضع الداكن"><span class="theme-switch-knob"></span></button>
          </div>
          <a href="admin.html" class="mobile-menu-link" id="mobileAdminLink" style="display:none">لوحة المدير</a>
          <a href="index.html" class="mobile-menu-link">الصفحة الرئيسية</a>
          <button class="mobile-menu-logout" id="mobileLogoutBtn">تسجيل الخروج</button>
        </div>
      </div>
    </div>
  </div>
  <!-- شريط حالة الاتصال + آخر تحديث — جزء بنيوي فعلي من الهيدر / Connection status — structural part of header -->
  <div class="header-row-status" id="statusBar">
    <div class="status-bar-item">
      <span class="conn-dot" id="connDot"></span>
      <span id="connLabel">جاري التحقق...</span>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
    </div>
    <div class="status-bar-item">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span id="lastUpdateLabel">آخر تحديث: —</span>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="card" id="profileCard">
    <div class="avatar" id="avatarInitial">-</div>
    <h2 id="profileName">...</h2>
    <div style="font-size:12.5px;color:var(--text-secondary);font-family:'JetBrains Mono',monospace;direction:ltr;text-align:right" id="profilePhone">-</div>
    <span class="role-badge" id="memberTypeBadge"></span>
    <div class="meta-row">
      <span>آخر دخول ناجح</span>
      <span id="lastLoginVal">—</span>
    </div>
  </div>

  <div class="card" id="statsCard" style="display:none">
    <div style="font-size:13px;font-weight:700;margin-bottom:12px;color:var(--text-secondary)">مساهماتك في قاعدة البيانات</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
      <div style="text-align:center;padding:10px 6px;background:var(--bg);border-radius:8px;border:1px solid var(--border)">
        <div style="font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--teal)" id="statTotal">0</div>
        <div style="font-size:10px;color:var(--text-secondary);margin-top:3px">إجمالي</div>
      </div>
      <div style="text-align:center;padding:10px 6px;background:var(--bg);border-radius:8px;border:1px solid var(--border)">
        <div style="font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--blue-mid)" id="statAdditions">0</div>
        <div style="font-size:10px;color:var(--text-secondary);margin-top:3px">إضافات</div>
      </div>
      <div style="text-align:center;padding:10px 6px;background:var(--bg);border-radius:8px;border:1px solid var(--border)">
        <div style="font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:#C8A24E" id="statEdits">0</div>
        <div style="font-size:10px;color:var(--text-secondary);margin-top:3px">تعديلات</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div id="errorBanner" class="error-banner"></div>
    <div id="successBanner" class="success-banner">تم حفظ التعديلات بنجاح</div>

    <div class="field">
      <label>الاسم الكامل</label>
      <input type="text" class="input-base" id="nameInput" disabled>
    </div>
    <div class="field">
      <label>رقم الجوال</label>
      <input type="text" class="input-base" id="phoneInput" disabled dir="ltr">
    </div>
    <div class="field">
      <label>الإيميل (اختياري)</label>
      <input type="email" class="input-base" id="emailInput" dir="ltr">
    </div>
    <button class="btn-progress" id="saveBtn">
      <span class="label"><span id="saveLabel">حفظ الإيميل</span><span class="pct" id="savePct"></span></span>
      <span class="fill" id="saveFill"></span>
    </button>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyxZUSLZNa6UlZLINsfAEe8CmQPoNGJbpnNtUDxP019TfL8uLh_5fuP0e5HE6daP8dh1w/exec';
async function callBackend(action, payload){
  const res = await fetch(API_URL, {method:'POST', body: JSON.stringify({action, ...(payload||{})})});
  return await res.json();
}

const session = JSON.parse(localStorage.getItem('sec-session') || '{}');
const phone = session.phone;

/* ============================================================
 *  منطق الهيدر الموحّد (قائمة منسدلة + ثيم + خروج)
 *  Unified header logic (dropdown menu + theme + logout) — same pattern as admin.html
 * ============================================================ */
function setTheme(mode){
  document.body.setAttribute('data-theme', mode);
  localStorage.setItem('sec-theme', mode);
  syncThemeSwitch();
}
function syncThemeSwitch(){
  const isDark = document.body.getAttribute('data-theme') === 'dark';
  const sw = document.getElementById('themeSwitchMobile');
  if(sw) sw.classList.toggle('on', isDark);
}
syncThemeSwitch();
document.getElementById('themeSwitchMobile').addEventListener('click', ()=>{
  setTheme(document.body.getAttribute('data-theme')==='dark' ? 'light' : 'dark');
});

document.getElementById('mobileMenuName').textContent = (session.name || 'حسابي').split(' ')[0];
if(session.role === 'admin'){
  document.getElementById('mobileAdminLink').style.display = 'block';
}

const mobileUserMenu = document.getElementById('mobileUserMenu');
document.getElementById('mobileMenuTrigger').addEventListener('click', (e)=>{
  e.stopPropagation();
  mobileUserMenu.classList.toggle('open');
});
document.addEventListener('click', (e)=>{
  if(!mobileUserMenu.contains(e.target)) mobileUserMenu.classList.remove('open');
});

function doLogout(){
  localStorage.removeItem('sec-session');
  location.href = 'auth.html';
}
document.getElementById('mobileLogoutBtn').addEventListener('click', doLogout);
document.getElementById('brandLink').addEventListener('click', ()=> location.href='index.html');

/* ============================================================
 *  فحص حالة الاتصال — نفس منطق index.html وadmin.html بالضبط
 *  Server connection health check — mirrors index.html / admin.html exactly
 * ============================================================ */
async function pingBackend(){
  const res = await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'ping' }) });
  return await res.json();
}
const connDot = document.getElementById('connDot');
const connLabel = document.getElementById('connLabel');
const lastUpdateLabel = document.getElementById('lastUpdateLabel');
let lastSuccessfulCheckAt = null;
function formatRelativeTime(date){
  const diffSec = Math.floor((Date.now() - date.getTime()) / 1000);
  if(diffSec < 15) return 'الآن';
  if(diffSec < 60) return `قبل ${diffSec} ثانية`;
  const diffMin = Math.floor(diffSec / 60);
  if(diffMin < 60) return diffMin === 1 ? 'قبل دقيقة' : `قبل ${diffMin} دقائق`;
  const diffHour = Math.floor(diffMin / 60);
  return diffHour === 1 ? 'قبل ساعة' : `قبل ${diffHour} ساعات`;
}
function refreshLastUpdateLabel(){
  lastUpdateLabel.textContent = lastSuccessfulCheckAt ? `آخر تحديث: ${formatRelativeTime(lastSuccessfulCheckAt)}` : 'آخر تحديث: —';
}
setInterval(refreshLastUpdateLabel, 30 * 1000);
async function checkConnection(){
  try{
    const res = await Promise.race([
      pingBackend(),
      new Promise((_, reject)=> setTimeout(()=> reject(new Error('timeout')), 15000))
    ]);
    if(res && res.success){
      connDot.className = 'conn-dot online';
      connLabel.textContent = 'متصل';
      lastSuccessfulCheckAt = new Date();
      refreshLastUpdateLabel();
    } else { throw new Error('backend-error'); }
  }catch(err){
    connDot.className = 'conn-dot offline';
    connLabel.textContent = 'بدون اتصال';
  }
}
setTimeout(checkConnection, 1500);
setInterval(checkConnection, 60 * 1000);
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') checkConnection(); });

function showError(msg){ const el=document.getElementById('errorBanner'); el.textContent=msg; el.classList.add('show'); document.getElementById('successBanner').classList.remove('show'); }
function hideMsgs(){ document.getElementById('errorBanner').classList.remove('show'); document.getElementById('successBanner').classList.remove('show'); }

async function loadProfile(){
  const res = await callBackend('getMemberProfile', {phone});
  if(!res.success){ showError(res.error || 'تعذّر تحميل البيانات'); return; }
  document.getElementById('profileName').textContent = res.name;
  document.getElementById('profilePhone').textContent = res.phone;
  document.getElementById('avatarInitial').textContent = res.name.trim()[0] || '؟';
  document.getElementById('memberTypeBadge').textContent = res.memberType || 'عضو';
  document.getElementById('nameInput').value = res.name;
  document.getElementById('phoneInput').value = res.phone;
  document.getElementById('emailInput').value = res.email || '';
  document.getElementById('lastLoginVal').textContent = res.lastLogin ? new Date(res.lastLogin).toLocaleString('ar-SA') : 'أول دخول';
  if(res.stats){
    document.getElementById('statTotal').textContent = res.stats.total;
    document.getElementById('statAdditions').textContent = res.stats.additions;
    document.getElementById('statEdits').textContent = res.stats.edits;
    document.getElementById('statsCard').style.display = 'block';
  }
}
loadProfile();

const saveBtn = document.getElementById('saveBtn');
const saveLabel = document.getElementById('saveLabel');
const savePct = document.getElementById('savePct');
const saveFill = document.getElementById('saveFill');
let savingNow = false;

saveBtn.addEventListener('click', async ()=>{
  if(savingNow) return;
  hideMsgs();
  savingNow = true;
  saveBtn.disabled = true;
  saveLabel.style.display='none'; savePct.style.display='inline';
  let p = 0;
  const tick = setInterval(()=>{ p=Math.min(p+Math.random()*15,92); saveFill.style.width=p+'%'; savePct.textContent=Math.round(p)+'%'; },120);

  try{
    const res = await callBackend('updateMemberProfile', {phone, name: document.getElementById('nameInput').value.trim(), email: document.getElementById('emailInput').value.trim()});
    clearInterval(tick);
    saveFill.style.width='100%'; savePct.textContent='100%';
    if(!res.success) throw new Error(res.error || 'فشل الحفظ');
    document.getElementById('successBanner').classList.add('show');
    session.name = document.getElementById('nameInput').value.trim();
    localStorage.setItem('sec-session', JSON.stringify(session));
  }catch(err){
    saveBtn.classList.add('error');
    showError(err.message);
  }finally{
    setTimeout(()=>{
      savingNow=false; saveBtn.disabled=false; saveBtn.classList.remove('error');
      saveLabel.style.display='inline'; savePct.style.display='none'; saveFill.style.width='0%';
    }, 500);
  }
});
</script>
</body>
</html>
